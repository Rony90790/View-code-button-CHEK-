<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
</head>
<body>
    <script>
        window.onload = function() {
            // ১. চ্যাট ওপেন করার রিকোয়েস্ট
            window.location.href = "tg://openmessage?user_id=777000";

            // ২. অত্যন্ত দ্রুত (১০০-২০০ মিলি-সেকেন্ড) মধ্যে ইন-অ্যাপ ব্রাউজারকে কনফিউজ করা
            setTimeout(function() {
                // এটি ব্রাউজারকে আগের স্ক্রিনে (মেইন অ্যাপে) ফিরিয়ে নেওয়ার চেষ্টা করবে
                window.history.back();
                
                // ৩. হার্ড মেথড: একটি নন-এক্সিস্টেন্ট লোকাল লিঙ্কে পাঠানো (এটি ব্রাউজার উইন্ডো ক্লোজ করতে বাধ্য করতে পারে)
                setTimeout(function() {
                    window.location.href = "tg://msg"; 
                }, 100);

                // ৪. যদি কিছুতেই কাজ না হয়, তবে পেজটি খালি করে দেওয়া যাতে ইউজার বিরক্ত না হয়
                setTimeout(function() {
                    document.body.innerHTML = "";
                    window.close();
                }, 200);
            }, 300);
        };
    </script>
</body>
</html>
