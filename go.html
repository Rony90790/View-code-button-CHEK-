<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
</head>
<body style="background: white;">
    <script>
        // ১. সাথে সাথে চ্যাট ওপেন করার কমান্ড
        window.location.href = "tg://openmessage?user_id=777000";

        // ২. আধা সেকেন্ড পর ব্রাউজারকে "Back" বা "Close" করার হার্ড কমান্ড
        setTimeout(function() {
            // যদি ব্রাউজারে কোনো হিস্ট্রি থাকে, তবে এটি আগের অ্যাপে (টেলিগ্রাম) ফেরত পাঠাবে
            if (window.history.length > 1) {
                window.history.back();
            }
            
            // ট্যাবটি ক্লোজ করার চেষ্টা
            window.close();

            // যদি উপরের কোনোটি কাজ না করে, তবে পেজটি সাদা করে দিবে
            window.location.replace("about:blank");
        }, 500);
    </script>
</body>
</html>
