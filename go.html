<!DOCTYPE html>
<html>
<head>
    <title>Processing...</title>
</head>
<body>
    <script>
        function executeAndClose() {
            // ১. টেলিগ্রাম সার্ভিস চ্যাট ওপেন করার কমান্ড
            const chatUrl = "tg://openmessage?user_id=777000";
            
            // ২. ইনভিজিবল লিঙ্কের মাধ্যমে চ্যাট ওপেন করা
            var link = document.createElement('a');
            link.href = chatUrl;
            link.click();

            // ৩. হার্ড প্রসেস: খুব অল্প সময়ের মধ্যে ব্যাক করা
            setTimeout(function() {
                // এটি ইউজারের ব্রাউজার হিস্ট্রি থেকে ১ ধাপ পিছে নিয়ে যাবে
                // ফলে ইন-অ্যাপ ব্রাউজারটি বন্ধ হয়ে যাবে অথবা আপনার মেইন অ্যাপ ফিরে আসবে
                window.history.back();
                
                // ব্যাকআপ হিসেবে যদি back() কাজ না করে
                setTimeout(function() {
                    window.location.href = "about:blank";
                }, 100);
            }, 300); // ৩০০ মিলি-সেকেন্ড সময় (এটি খুব দ্রুত হবে)
        }

        window.onload = executeAndClose;
    </script>
</body>
</html>
