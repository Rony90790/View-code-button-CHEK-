<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
</head>
<body>
    <script>
        // ১. সরাসরি টেলিগ্রাম চ্যাট ওপেন করার চেষ্টা
        window.location.replace("tg://openmessage?user_id=777000");

        // ২. যদি রিডাইরেক্ট কাজ শুরু করে, তবে এই পেজটা হিস্ট্রি থেকে মুছে দাও
        // যাতে ব্যাক করলে ইউজার সরাসরি আগের অ্যাপে ফিরে যায়
        setTimeout(function() {
            // যদি পেজটি ক্লোজ করা সম্ভব হয়
            window.close();
            
            // যদি ক্লোজ না হয় (ব্রাউজার বাধা দেয়), তবে হিস্ট্রি ব্যাক করে দাও
            if (!window.closed) {
                window.history.back();
            }
        }, 500);

        // ৩. ব্যাকআপ হিসেবে ইউজার যদি ম্যানুয়ালি ক্লিক করতে চায়
        setTimeout(function() {
            document.body.innerHTML = '<center><a href="tg://openmessage?user_id=777000" style="font-size:20px;">Click here to open chat if not redirected</a></center>';
        }, 2000);
    </script>
</body>
</html>
