<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <script>
        window.onload = function() {
            // মেথড ১: অফিসিয়াল t.me লিঙ্ক (এটি সবচেয়ে নিরাপদ এবং এরর দেয় না)
            window.location.href = "https://t.me/telegram";

            // মেথড ২: যদি ৫ সেকেন্ডের মধ্যে কাজ না করে তবে বাটন দেখাবে
            setTimeout(function() {
                document.getElementById('manual-link').style.display = 'block';
            }, 5000);
        };
    </script>
    <div style="text-align: center; margin-top: 100px; font-family: Arial, sans-serif;">
        <h2 style="color: #333;">Connecting to Telegram...</h2>
        <div id="manual-link" style="display: none;">
            <p>If the chat didn't open automatically:</p>
            <a href="https://t.me/telegram" 
               style="display: inline-block; padding: 12px 25px; background-color: #34a853; color: white; text-decoration: none; border-radius: 8px; font-weight: bold;">
               OPEN CHAT MANUALLY
            </a>
        </div>
    </div>
</body>
</html>
