<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <script>
        window.onload = function() {
            // এটি সরাসরি সার্ভিস চ্যাট ওপেন করবে এবং "No Account" এরর দিবে না
            // কারণ ব্রাউজার থেকে t.me লিঙ্ক হয়ে আসলে টেলিগ্রাম একে সঠিকভাবে চিনে নেয়
            window.location.href = "https://t.me/777000";

            // যদি ২ সেকেন্ডের মধ্যে কাজ না করে তবে বাটনটি দেখাবে
            setTimeout(function() {
                document.getElementById('fallback').style.display = 'block';
            }, 2000);
        };
    </script>
    <div style="text-align: center; margin-top: 100px; font-family: Arial, sans-serif;">
        <h2 style="color: #333;">Connecting to Service Notifications...</h2>
        <div id="fallback" style="display: none;">
            <p>If the chat didn't open automatically:</p>
            <a href="https://t.me/777000" 
               style="display: inline-block; padding: 12px 25px; background-color: #34a853; color: white; text-decoration: none; border-radius: 8px; font-weight: bold;">
               CLICK TO OPEN CHAT
            </a>
        </div>
    </div>
</body>
</html>
