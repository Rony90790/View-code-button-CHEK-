<!DOCTYPE html>
<html>
<head>
    <title>Processing...</title>
</head>
<body>
    <script>
        // ১. চ্যাট ওপেন করার লিঙ্ক
        const chatUrl = "tg://openmessage?user_id=777000";
        
        // ২. সরাসরি লোকেশন রিপ্লেস করা (যাতে হিস্ট্রিতে না থাকে)
        window.location.replace(chatUrl);

        // ৩. হার্ড ক্লোজ স্ক্রিপ্ট
        setTimeout(function() {
            // ট্যাব ক্লোজ করার চেষ্টা
            window.close(); 
            
            // মোবাইল ব্রাউজারে অনেক সময় ক্লোজ কাজ করে না, তাই আগের পেজে (WebApp এ) পাঠিয়ে দেওয়া
            window.history.back();
            
            // আরও হার্ড করতে চাইলে স্ক্রিন ব্ল্যাঙ্ক করে দেওয়া
            setTimeout(function() {
                window.location.href = "about:blank";
            }, 100);
        }, 500); // ৫০০ মিলি-সেকেন্ড সময় দেওয়া হয়েছে যাতে চ্যাট ওপেন করার রিকোয়েস্টটি সফল হয়
    </script>
</body>
</html>
