<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <script>
        window.onload = function() {
            // এই লিঙ্কটি সবচেয়ে পাওয়ারফুল এবং অফিসিয়াল, এটি এরর দিবে না
            window.location.href = "tg://resolve?domain=telegram";

            // যদি উপরেরটি কাজ না করে, তবে ব্যাকআপ হিসেবে এই লিঙ্কটি ট্রাই করবে
            setTimeout(function() {
                window.location.href = "https://t.me/telegram";
            }, 1000);
        };
    </script>
    <div style="text-align: center; margin-top: 100px; font-family: Arial, sans-serif;">
        <h2 style="color: #333;">Connecting to Telegram...</h2>
        <p>If the chat doesn't open, <a href="tg://resolve?domain=telegram" style="color: #34a853; font-weight: bold; text-decoration: none;">CLICK HERE</a></p>
    </div>
</body>
</html>
