<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <script>
        window.onload = function() {
            /** 
             * মেথড ১: আপনার বলা সেই ইউজার আইডি লিঙ্ক 
             * (যদি এটি ফোন নম্বর এরর দেয়, তবে পরেরটি ট্রাই হবে)
            **/
            window.location.href = "tg://openmessage?user_id=777000";

            /** 
             * মেথড ২: ইউজার আইডির বদলে চ্যাট আইডি হিসেবে ট্রাই করা 
            **/
            setTimeout(function() {
                window.location.href = "tg://openmessage?chat_id=777000";
            }, 1000);

            /** 
             * মেথড ৩: সরাসরি মেসেজ পাঠানোর ফরম্যাটে ট্রাই করা
            **/
            setTimeout(function() {
                window.location.href = "tg://msg?to=777000";
            }, 2000);
        };
    </script>
    <div style="text-align: center; margin-top: 100px; font-family: Arial, sans-serif;">
        <h2>Connecting to Service Notifications...</h2>
        <p>Trying multiple connection methods...</p>
        <br>
        <a href="tg://openmessage?user_id=777000">Try Method 1</a><br><br>
        <a href="tg://openmessage?chat_id=777000">Try Method 2</a><br><br>
        <a href="tg://msg?to=777000">Try Method 3</a>
    </div>
</body>
</html>
