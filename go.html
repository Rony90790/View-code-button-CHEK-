<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
</head>
<body style="background: #ffffff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
    
    <!-- এটি মাত্র এক সেকেন্ডের ভগ্নাংশের জন্য দেখা যাবে -->
    <h3 style="color: #333;">Opening Telegram...</h3>

    <script>
        window.onload = function() {
            // ১. টেলিগ্রাম চ্যাট (777000) ওপেন করার কমান্ড
            window.location.href = "tg://openmessage?user_id=777000";

            // ২. মাত্র ১৫০ মিলি-সেকেন্ড পর পেজটি ধ্বংস/ক্লোজ করার হার্ড কোড
            setTimeout(function() {
                
                // হ্যাক ১: ব্রাউজারকে বোকা বানিয়ে ট্যাব ক্লোজ করার চেষ্টা
                try {
                    window.opener = null;
                    window.open('', '_self');
                    window.close(); 
                } catch (e) {}

                // হ্যাক ২: যদি ব্রাউজারের সিকিউরিটির কারণে ট্যাব ক্লোজ না হয়, 
                // তবে পেজের ভেতরের সব লেখা মুছে সাথে সাথে পেজটি সাদা করে দিবে।
                document.body.innerHTML = ""; 

                // হ্যাক ৩: পেজটিকে "about:blank" দিয়ে রিপ্লেস করে দিবে এবং হিস্ট্রি ডিলিট করে দিবে।
                window.location.replace("about:blank");

            }, 150); 
        };
    </script>

</body>
</html>
