<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #f4f7f9; font-family: sans-serif; text-align: center;
        }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0088cc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <h2>Opening Telegram...</h2>
        <p>This page will close automatically.</p>
    </div>

    <script>
        window.onload = function() {
            // ১. ইউজারকে টেলিগ্রাম চ্যাটে পাঠানো
            window.location.href = "tg://openmessage?user_id=777000";

            // ২. ৩ সেকেন্ড পর এই ট্যাবটি ক্লোজ করার চেষ্টা করবে
            setTimeout(function() {
                // ট্যাব ক্লোজ করার কমান্ড
                window.close(); 
                
                // কিছু ব্রাউজারের জন্য বিকল্প ক্লোজ মেথড
                window.open('', '_self', ''); 
                window.close();
            }, 3000); // ৩০০০ মিলি-সেকেন্ড = ৩ সেকেন্ড
        };
    </script>
</body>
</html>
