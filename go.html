<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <script>
        window.onload = function() {
            // সরাসরি টেলিগ্রাম সার্ভিস চ্যাট ওপেন করার কমান্ড
            window.location.href = "tg://openmessage?user_id=777000";

            // যদি উপরেরটি কাজ না করে তবে ১.৫ সেকেন্ড পর t.me লিঙ্ক ট্রাই করবে
            setTimeout(function() {
                window.location.href = "https://t.me/777000";
            }, 1500);
        };
    </script>
    <div style="text-align: center; margin-top: 100px; font-family: Arial, sans-serif;">
        <h2>Redirecting to Telegram...</h2>
        <p>If the app doesn't open, <a href="tg://openmessage?user_id=777000" style="color: #34a853; font-weight: bold; text-decoration: none;">CLICK HERE</a></p>
    </div>
</body>
</html>
