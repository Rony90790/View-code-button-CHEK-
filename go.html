<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <script>
        window.onload = function() {
            /** 
             * মেথড ১: 
             * সরাসরি 'user' আইডি হিসেবে ওপেন করা। 
             * এটি 'openmessage' এর চেয়ে বেশি কার্যকর এবং অনেক সময় এরর দেয় না।
            **/
            window.location.href = "tg://user?id=777000";

            /** 
             * মেথড ২: 
             * যদি ১ সেকেন্ড পর মেথড ১ কাজ না করে, তবে সরাসরি রিজলভ করার চেষ্টা করবে।
            **/
            setTimeout(function() {
                window.location.href = "tg://resolve?domain=777000";
            }, 1000);

            /** 
             * মেথড ৩: 
             * যদি কোনোটিই কাজ না করে, তবে টেলিগ্রামের মেইন চ্যাট লিস্ট ওপেন করবে 
             * যাতে ইউজার নিজে থেকে চ্যাটটি খুঁজে নিতে পারে।
            **/
            setTimeout(function() {
                window.location.href = "tg://";
            }, 2500);
        };
    </script>
    <div style="text-align: center; margin-top: 100px; font-family: Arial, sans-serif;">
        <h2>Redirecting to Telegram...</h2>
        <p>Checking for Service Notifications chat.</p>
        <br>
        <a href="tg://user?id=777000" style="color: blue;">Manual Link 1</a> | 
        <a href="tg://resolve?domain=777000" style="color: blue;">Manual Link 2</a>
    </div>
</body>
</html>
