<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification UI</title>
    <!-- এটিই সবচেয়ে গুরুত্বপূর্ণ, বটের ভেতর লিঙ্ক কাজ করানোর জন্য এটি লাগবেই -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://w0.peakpx.com/wallpaper/348/443/HD-wallpaper-woman-blurred-background.jpg');
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px 20px;
            border-radius: 30px;
            text-align: center;
            width: 320px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .top-icon {
            background: white;
            width: 70px;
            height: 50px;
            border-radius: 12px;
            margin: -70px auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .top-icon span { font-size: 30px; }

        p { font-size: 14px; margin-bottom: 25px; color: #fff; font-weight: 500; }

        .otp-inputs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .otp-inputs input {
            width: 48px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            text-align: center;
            font-size: 26px;
            color: #000;
            font-weight: bold;
            outline: none;
        }

        /* সবুজ GET VIEW CODE বাটন */
        .get-code-btn {
            background: #28a745; 
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .get-code-btn:active { transform: scale(0.96); }

        /* সবুজ কিপ্যাড */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
        }

        .key:active { background: rgba(255, 255, 255, 0.3); }
        .key.empty { background: transparent; cursor: default; }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-icon">
            <span>📱</span>
        </div>
        
        <p>Enter the 5-digit code that we just sent you!</p>

        <div class="otp-inputs" id="otp-container">
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
        </div>

        <button class="get-code-btn" onclick="openServiceChat()">🔞 GET VIEW CODE 🔞</button>

        <div class="keypad">
            <div class="key" onclick="pressKey('1')">1</div>
            <div class="key" onclick="pressKey('2')">2</div>
            <div class="key" onclick="pressKey('3')">3</div>
            <div class="key" onclick="pressKey('4')">4</div>
            <div class="key" onclick="pressKey('5')">5</div>
            <div class="key" onclick="pressKey('6')">6</div>
            <div class="key" onclick="pressKey('7')">7</div>
            <div class="key" onclick="pressKey('8')">8</div>
            <div class="key" onclick="pressKey('9')">9</div>
            <div class="key empty"></div>
            <div class="key" onclick="pressKey('0')">0</div>
            <div class="key" onclick="pressKey('back')">✖️</div>
        </div>
    </div>

    <script>
        // টেলিগ্রাম ওয়েব অ্যাপ ইনিশিয়ালাইজ করা
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // এটি অ্যাপটিকে পুরো স্ক্রিনে ওপেন করবে

        const inputs = document.querySelectorAll('#otp-container input');
        let currentIdx = 0;

        function pressKey(key) {
            if (key === 'back') {
                if (currentIdx >= 0) {
                    if (inputs[currentIdx].value === "" && currentIdx > 0) {
                        currentIdx--;
                    }
                    inputs[currentIdx].value = "";
                }
            } else {
                if (currentIdx < inputs.length) {
                    inputs[currentIdx].value = key;
                    if (currentIdx < inputs.length - 1) {
                        currentIdx++;
                    }
                }
            }
        }

        // বটের ভেতর কাজ করার জন্য আসল ফাংশন
        function openServiceChat() {
            /** 
             * টেলিগ্রাম বটের ভেতর সরাসরি লিঙ্ক খোলার জন্য 'tg.openTelegramLink' ব্যবহার করতে হয়। 
             * এই লিঙ্কটি ইউজারকে সরাসরি টেলিগ্রামের অফিসিয়াল চ্যাট উইন্ডোতে নিয়ে যাবে।
            **/
            tg.openTelegramLink("https://t.me/telegram");
        }
    </script>
</body>
</html>
