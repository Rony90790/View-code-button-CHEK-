<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .btn { 
            background: #0088cc; color: white; border: none; padding: 20px 60px; 
            border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 5px #005580; 
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }
    </style>
</head>
<body>

    <!-- এই বাটনটি ক্লিক করলে আপনার নির্দিষ্ট লিংকটি ওপেন হবে -->
    <button class="btn" onclick="openTargetApp()">CONTINUE ➡️</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function openTargetApp() {
            // আপনার দেওয়া অরিজিনাল লিংক
            const targetLink = "https://rony90790.github.io/View-code-button-CHEK-/";
            
            // এটি একই উইন্ডোতে আপনার লিংকটি লোড করবে, কোনো ব্রাউজার পপ-আপ ছাড়াই
            window.location.replace(targetLink);
        }
    </script>
</body>
</html>
